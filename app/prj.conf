# Analisador de espectro - esqueleto de tempo real (fase F0).

# --- Console + shell via SEGGER RTT (sobre o ST-LINK, sem hardware extra) ---
CONFIG_USE_SEGGER_RTT=y
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=n
CONFIG_SHELL_BACKEND_RTT=y
CONFIG_KERNEL_SHELL=y
# down-buffer maior para nao truncar linhas longas coladas no terminal RTT
CONFIG_SEGGER_RTT_BUFFER_SIZE_DOWN=64

# Logging roteado pelo backend do shell (nao intrusivo)
CONFIG_LOG=y

# --- Inspecao de tarefas de tempo real (comando `kernel threads`/`stacks`) ---
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_RUNTIME_STATS=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_INIT_STACKS=y

# --- Periféricos ja usados no F0 ---
CONFIG_GPIO=y

# --- FPU: ja habilitada para a futura FFT (CMSIS-DSP, fase F3) ---
CONFIG_FPU=y
