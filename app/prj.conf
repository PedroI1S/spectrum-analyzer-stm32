# Analisador de espectro / afinador em tempo real (STM32F4-Discovery).

# --- Console + shell via SEGGER RTT (sobre o ST-LINK, sem hardware extra) ---
CONFIG_USE_SEGGER_RTT=y
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=n
CONFIG_SHELL_BACKEND_RTT=y
CONFIG_KERNEL_SHELL=y
# down-buffer maior para nao truncar linhas longas coladas no terminal RTT
CONFIG_SEGGER_RTT_BUFFER_SIZE_DOWN=64

# Logging roteado pelo backend do shell (nao intrusivo)
CONFIG_LOG=y

# --- Inspecao de tarefas de tempo real (comando `kernel threads`/`stacks`) ---
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_RUNTIME_STATS=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_INIT_STACKS=y

# --- Periféricos ---
CONFIG_GPIO=y

# --- Display OLED SSD1306 no I2C1 (fase F1) ---
CONFIG_I2C=y
CONFIG_DISPLAY=y
CONFIG_SSD1306=y
CONFIG_CHARACTER_FRAMEBUFFER=y
CONFIG_HEAP_MEM_POOL_SIZE=16384

# --- Microfone INMP441 no I2S2 (fase F2) ---
CONFIG_I2S=y
CONFIG_DMA=y

# --- FPU + CMSIS-DSP (FFT do espectro, fase F4) ---
CONFIG_FPU=y
# obrigatorio com mais de uma thread usando float (acq_fft + display):
# sem isso os registradores do FPU nao sao salvos no context switch
CONFIG_FPU_SHARING=y
CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_TRANSFORM=y
CONFIG_CMSIS_DSP_COMPLEXMATH=y
# dot product (autocorrelacao) + mean/power do afinador
CONFIG_CMSIS_DSP_BASICMATH=y
CONFIG_CMSIS_DSP_STATISTICS=y
